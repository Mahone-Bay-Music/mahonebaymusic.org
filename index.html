<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Mahone Bay Music Association (MBMA) hosts summer live music at the town gazebo in Mahone Bay.">
    <title>Mahone Bay Music Association</title>
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon/favicon-16x16.png">

    <link rel="manifest" href="/assets/favicon/site.webmanifest">

<body>
    <div class="site-bg" aria-hidden="true"></div>

        <div class="brand-wrap">

                <img src="/assets/images/gazebo.webp" alt="Mahone Bay Music Association logo" class="logo">
            </a>
            <div>

        <p>MBMA is a non-profit organization supporting live music in Mahone Bay, Nova Scotia, Canada.</p>
